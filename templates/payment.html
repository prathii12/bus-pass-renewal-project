<!DOCTYPE html>
<html lang="en">
<head>
    <title>Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #2193b0, #6dd5ed);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 380px;">
        
        <h4 class="text-center mb-3">💳 Payment</h4>

        <!-- Details -->
        <div class="mb-3">
            <p><strong>Route:</strong> {{ r.route }}</p>
            <p><strong>Type:</strong> {{ r.pass_type }}</p>
            <p><strong>Amount:</strong> ₹{{ r.amount }}</p>
            <p><strong>Payment Method:</strong> {{ r.payment_method }}</p>
        </div>

        <!-- Pay Button -->
        <a href="/payment_success/{{ r.id }}" class="btn btn-success w-100">
            Pay Now
        </a>

        <!-- Back -->
        <div class="text-center mt-3">
            <a href="/dashboard">Back</a>
        </div>

    </div>
</div>

</body>
</html>
