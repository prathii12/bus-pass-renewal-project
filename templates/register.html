<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 380px;">
        
        <h3 class="text-center mb-3">Register</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" placeholder="Enter Name" name="name" required>
            </div>

            <div class="mb-3">
                <label>User ID</label>
                <input type="text" class="form-control" placeholder="ex: prathi123" name="userid" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text" class="form-control" placeholder="Enter Phone Number" name="phone" required>
            </div>

            <!-- Password Field -->
            <div class="mb-3 position-relative">
                <label>Password</label>

                <input type="password" class="form-control" id="password" placeholder="Enter Password" name="password" required>

                <span id="eye" onclick="togglePassword()" 
                      style="position:absolute; right:10px; top:38px; cursor:pointer;">
                    👁️
                </span>
            </div>

            <button class="btn btn-success w-100">Register</button>

        </form>

        <div class="text-center mt-3">
            Already have account? <a href="/login">Login</a>
        </div>

    </div>
</div>

<!-- Script -->
<script>
function togglePassword() {
    var pass = document.getElementById("password");
    var eye = document.getElementById("eye");

    if (pass.type === "password") {
        pass.type = "text";
        eye.innerText = "🙈";
    } else {
        pass.type = "password";
        eye.innerText = "👁️";
    }
}
</script>

</body>
</html>
